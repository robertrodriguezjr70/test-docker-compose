version: "3.9"
# This is a test docker compose file with simple services for testing
services:
  apache:
    image: httpd:latest
    container_name: apache_server
#    restart: unless-stopped  # restart unless you manually stopped it
#    restart: on-failure      # restart only if container exits with an error
    restart: always          # always restart
    ports:
      - "80:80"
    volumes:
      - ./html:/usr/local/apache2/htdocs/
  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
  whoami:
    image: traefik/whoami
    container_name: whoami_server
#    restart: unless-stopped  # restart unless you manually stopped it
#    restart: on-failure      # restart only if container exits with an error
    restart: always          # always restart
    ports:
      - "8081:80"
  alpine:
    image: alpine:latest
    container_name: alpine_test
#    restart: unless-stopped  # restart unless you manually stopped it
#    restart: on-failure      # restart only if container exits with an error
    restart: always          # always restart
    command: sh -c "while true; do sleep 3600; done"
  redis:
    image: redis:latest
    container_name: redis_server
#    restart: unless-stopped  # restart unless you manually stopped it
#    restart: on-failure      # restart only if container exits with an error
    restart: always          # always restart
    ports:
      - "6379:6379"
